# Config template: configs/<host>.conf
#
# Carregado por ../orchestrate.sh <host>. Bash sourced -- sintaxe shell.
# Copie este arquivo pra configs/<seu-device>.conf e edite. Confs reais sao
# gitignored (ver .gitignore); apenas este template fica versionado.

# Apps via winget/msstore. Hashtables permitem source/silent override.
# Formato:
#   string                          -> winget Id, modo silent
#   @{Id="..."; Silent=$false}      -> sem -Mode Silent (apps que dao access violation)
#   @{Id="..."; Source="msstore"}   -> origem msstore
APPS='@(
    "Microsoft.PowerShell",
    "Microsoft.PowerToys",
    "GitHub.cli"
)'

# Desabilitar touchscreen (digitizer ghost touch?). Default false.
DISABLE_TOUCHSCREEN=false

# Acao do botao do lid (fechar tampa). Opt-in: deixe vazio pra usar default Win.
# Valores: nothing | sleep | hibernate | shutdown
#   LID_AC=nothing       # plugado na tomada
#   LID_DC=sleep         # bateria

# Skip flags pra steps individuais do orchestrate.sh. Default todos false.
SKIP_HARDENING=false
SKIP_WIN_UPDATE=false
SKIP_INSTALL_APPS=false
SKIP_TAILSCALE=false

# Tailscale auth key e SEMPRE via env var no comando, nunca aqui (one-time secret).
#   TAILSCALE_AUTH_KEY=tskey-... ./orchestrate.sh <host>
